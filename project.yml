name: OpenClawStarter
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    CODE_SIGN_STYLE: Automatic
targets:
  OpenClawApp:
    type: application
    platform: iOS
    sources:
      - ios/OpenClawApp
      - ios/Shared
    info:
      path: ios/OpenClawApp/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Teach it your first sound. Your pet starts with no mapped human language; let it hear the sounds you want to teach."
        NSSpeechRecognitionUsageDescription: "Help it understand the sound. Speech recognition turns the sounds you make into the fragments your pet repeats back."
        UIBackgroundModes:
          - audio
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            "127.0.0.1":
              NSExceptionAllowsInsecureHTTPLoads: true
        OPENCLAW_API_BASE_URL: "http://127.0.0.1:8989"
    entitlements:
      path: ios/OpenClawApp/OpenClawApp.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.openclaw.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.app
        INFOPLIST_KEY_NSSupportsLiveActivities: true
    dependencies:
      - target: OpenClawBroadcastExtension
        embed: true
      - target: OpenClawWidgetExtension
        embed: true

  OpenClawBroadcastExtension:
    type: app-extension
    platform: iOS
    sources:
      - ios/OpenClawBroadcastExtension
    info:
      path: ios/OpenClawBroadcastExtension/Info.plist
      properties:
        CFBundleName: "OpenClaw Broadcast"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: "XPC!"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.broadcast-services-upload
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).SampleHandler"
          RPBroadcastProcessMode: RPBroadcastProcessModeSampleBuffer
    entitlements:
      path: ios/OpenClawBroadcastExtension/OpenClawBroadcastExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.openclaw.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.app.broadcast
        APPLICATION_EXTENSION_API_ONLY: true

  OpenClawWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - ios/OpenClawWidgetExtension
      - ios/Shared
    info:
      path: ios/OpenClawWidgetExtension/Info.plist
      properties:
        CFBundleName: "OpenClaw Widget"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: "XPC!"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: ios/OpenClawWidgetExtension/OpenClawWidgetExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.openclaw.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.app.widget
        APPLICATION_EXTENSION_API_ONLY: true
